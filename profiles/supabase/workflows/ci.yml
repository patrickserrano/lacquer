name: Supabase CI

# Deno backend — runs on a GitHub-hosted runner (no Apple toolchain).

on:
  workflow_dispatch:
  pull_request:
    # No path filter on purpose: the workflow must run on EVERY PR so the single
    # required check (CI OK) always reports. A path-filtered workflow that doesn't
    # run leaves required checks stuck "pending" and blocks docs-only PRs (forcing
    # an admin bypass). The heavy `check` job is instead gated at the job level via
    # the `changes` job's `code` output. Mirrors the iOS profile.
    branches: [main, develop, 'feat/*', 'fix/*']
  push:
    branches: [main]
    paths:
      - "{{COMPONENT_PREFIX}}**"

permissions:
  contents: read

concurrency:
  group: supabase-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    # Pure git diff — no toolchain — so it always runs and lets CI OK report even
    # on docs-only PRs where the heavy check is skipped.
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - id: filter
        name: Check for code changes
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            # push / manual dispatch: treat as a code change so the check job runs.
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          changed="$(git diff --name-only "$base" "$head")"
          # `code` gates the heavy check job: run it unless the PR is docs-only, so
          # CI OK still reports green on docs PRs (no admin bypass). This is an
          # INVERTED deny-list (any non-docs change -> code=true) on purpose: a path
          # ALLOWLIST anchored on {{COMPONENT_PREFIX}} produces the regex `^(|...)`
          # for a root-layout project (empty prefix) — an empty ERE alternative that
          # some greps reject. The deny-list has no prefix and no empty alternative,
          # so it is layout-independent and fails safe (over-run, not under-run). It
          # is written portably (`-cv` count, no `-qv`) so it behaves the same on
          # this job's ubuntu GNU grep and on the self-hosted runner's ugrep.
          nondocs=$(echo "$changed" | grep -cvE '(\.md$|^docs/|^LICENSE$|^\.gitignore$)' || true)
          if [ "${nondocs:-0}" -gt 0 ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  check:
    name: Format · Lint · Test
    runs-on: ubuntu-latest
    needs: changes
    # Skip on docs-only PRs. Skipped counts as passing for the CI OK aggregator.
    if: needs.changes.outputs.code == 'true'
    defaults:
      run:
        working-directory: "{{COMPONENT_PREFIX}}."
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno check supabase/functions/*/index.ts

      - name: Test
        run: deno test --allow-all supabase/functions/

  lint-database:
    name: DB Lint (Splinter)
    # CLAUDE.supabase.md calls RLS "the security boundary" — Splinter (supabase db
    # lint) is what actually enforces it in CI, catching missing-RLS and
    # security-definer issues the Edge-Function checks never see.
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: "{{COMPONENT_PREFIX}}."
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with:
          version: latest

      # Boots Postgres + applies migrations; a broken migration fails here (desired).
      - name: Start local stack
        run: supabase start

      - name: Lint database schema
        run: supabase db lint --level warning

  test-database:
    name: DB Tests (pgTAP)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: "{{COMPONENT_PREFIX}}."
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with:
          version: latest

      - name: Start local stack
        run: supabase start

      # No-op gracefully until the project adds its first pgTAP test.
      - name: Run pgTAP tests
        run: |
          if ls supabase/tests/*.sql >/dev/null 2>&1; then
            supabase test db
          else
            echo "no pgTAP tests yet"
          fi

  ci-ok:
    name: CI OK
    # Just aggregates the needs[] results — no toolchain — so it always runs and
    # always reports. This is the single required status check (branch protection
    # points at "CI OK", not at the check job), so it never gets stuck "pending"
    # on a docs-only PR where the check job skips. Fails only if a required job
    # actually FAILED or was CANCELLED; a skipped job counts as OK.
    runs-on: ubuntu-latest
    needs: [changes, check, lint-database, test-database]
    if: always()
    timeout-minutes: 2
    steps:
      - name: Verify required jobs passed (or were skipped)
        run: |
          echo "changes=${{ needs.changes.result }} check=${{ needs.check.result }} lint-database=${{ needs.lint-database.result }} test-database=${{ needs.test-database.result }}"
          for r in \
            "${{ needs.changes.result }}" \
            "${{ needs.check.result }}" \
            "${{ needs.lint-database.result }}" \
            "${{ needs.test-database.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required job did not pass (result=$r)"
              exit 1
            fi
          done
          echo "All required jobs passed or were skipped."
