name: Scheduled Quality Review

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays at 09:00 UTC
  workflow_dispatch:

jobs:
  quality-review:
    runs-on: [self-hosted, macOS, ARM64, dedicated]
    permissions:
      contents: read
      issues: write
      pull-requests: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Select random feature module
        id: module
        run: |
          set -euo pipefail
          # Find any Features/ directory under the component without assuming
          # its parent's name (source dir may be App/, Sources/, etc.), then
          # pick one module portably — stock macOS has no shuf.
          module=$(find {{COMPONENT_PREFIX}}. -type d -name Features -not -path '*/.build/*' -not -path '*/DerivedData*/*' \
            -exec sh -c 'ls -d "$1"/*/ 2>/dev/null' _ {} \; \
            | awk 'BEGIN{srand()} {a[NR]=$0} END{if(NR>0) printf "%s", a[int(rand()*NR)+1]}')
          if [ -z "$module" ]; then
            echo "::notice::No feature modules found under a Features/ directory — skipping quality review."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "module=$module" >> "$GITHUB_OUTPUT"
          echo "Selected module: $module"

      - name: Run Claude Code quality review
        if: steps.module.outputs.found == 'true'
        uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            Review the SwiftUI code quality for the feature module: ${{ steps.module.outputs.module }}.

            Focus on:
            - SwiftUI best practices and consistency
            - Code smells, duplication, or unnecessary complexity
            - Missing or weak tests (especially ViewModel/service layers)
            - Documentation gaps or unclear intent
            - Performance pitfalls (excessive re-renders, heavy body logic, etc.)

            If you find actionable issues, create GitHub issues with clear titles and repro/steps.
            Apply labels: ios, quality.
            If no issues are found, leave a brief comment in the workflow logs summarizing the review.
