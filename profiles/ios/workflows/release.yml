name: iOS Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_testflight:
        description: 'Skip TestFlight upload (build only)'
        required: false
        default: 'false'
        type: boolean
      whats_new:
        description: "TestFlight 'What's New' notes (blank = auto-generate from commits)"
        required: false
        default: ''
        type: string

concurrency:
  group: ios-release
  cancel-in-progress: false

permissions:
  contents: read

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  build-and-deploy:
    name: Build and Deploy to TestFlight
    runs-on: [self-hosted, macOS, ARM64, dedicated]
    timeout-minutes: 45
    permissions:
      # action-gh-release creates the GitHub Release (write covers checkout's read).
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install Codemagic CLI tools
        run: |
          brew install pipx
          pipx install codemagic-cli-tools==0.68.0
          pipx ensurepath
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          # --user-install: the dedicated runner's system gem dir isn't writable
          # (Gem::FilePermissionError otherwise). Put the user gem bin on PATH so
          # the bare `| xcpretty` pipes below resolve it. Mirrors ios-ci.yml.
          gem install xcpretty -v 0.4.1 --user-install --no-document
          echo "$(ruby -e 'puts File.join(Gem.user_dir, "bin")')" >> $GITHUB_PATH

      - name: Fetch signing files
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.ASC_KEY_CONTENT }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # The SHARED, UNIFIED distribution certificate private key. Every app on
          # this team signs with ONE Apple Distribution cert — the account holds
          # exactly one — so this secret MUST be the same shared key across all
          # apps (source of truth: 1Password "iOS CI Signing Credentials"). Using
          # a per-app key mints a second same-named cert and causes xcodebuild to
          # pick the wrong one on the shared runner ("profile doesn't include
          # signing certificate"). fetch-signing-files pairs the key with the
          # fetched cert; without it the step fails "Cannot save Signing
          # Certificates without certificate private key" (at the cert limit,
          # --create alone can't mint a new keypair).
          CERTIFICATE_PRIVATE_KEY: ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
        run: |
          # The certificates dir is SHARED across every app's release pipeline on
          # the dedicated runner. Clear stale certs first so `keychain
          # add-certificates` (below) loads ONLY the freshly-fetched unified cert,
          # never a leftover from another app that would create a duplicate,
          # same-named identity and break signing. The p12s are re-downloadable.
          rm -f "$HOME/Library/Developer/Xcode/UserData/Certificates/"*.p12 || true
          # Bundle id is a POSITIONAL arg in codemagic-cli-tools (there is no
          # --bundle-id flag; passing it errors "unrecognized arguments").
          app-store-connect fetch-signing-files "{{BUNDLE_ID}}" \
            --platform IOS \
            --type IOS_APP_STORE \
            --create

      - name: Unlock login keychain
        env:
          # Org-level secret (always set): the dedicated runner's login-keychain
          # password.
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Use the runner's EXISTING system login keychain — never create a
          # temporary one. A fresh keychain pops an interactive unlock dialog on
          # the dedicated Mac runner that hangs the job; the login keychain already
          # holds the signing identity. The auto-lock timeout must outlast the
          # job (timeout-minutes: 45) but no more — the final "Lock keychain"
          # step re-locks explicitly, so the unlocked window never outlives the run.
          KEYCHAIN=~/Library/Keychains/login.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"

      - name: Add certificates to keychain
        # No `keychain initialize` — so codemagic adds the fetched cert to the
        # system default (login) keychain we just unlocked, not a fresh temporary
        # one.
        run: keychain add-certificates

      - name: Grant codesign access to signing keys
        env:
          # Org-level secret (always set): the dedicated runner's login-keychain
          # password.
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Grant codesign/productsign non-interactive access to the signing
          # keys. Must run AFTER `keychain add-certificates`: the partition-list
          # ACL only covers keys present at the time it is set, so it has to
          # include the freshly added ones.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db

      - name: Set Xcode project code signing
        run: xcode-project use-profiles --export-options-plist {{COMPONENT_PREFIX}}ExportOptions.plist

      - name: Increment build number
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          # Requires the numeric Apple ID (from App Store Connect → App Information).
          # Set {{ASC_APP_ID}} when scaffolding this template.
          RAW=$(app-store-connect get-latest-testflight-build-number {{ASC_APP_ID}} 2>&1)
          echo "get-latest-testflight-build-number output: $RAW"
          LATEST=$(echo "$RAW" | grep -E '^[0-9]+$' | tail -1)
          if ! [[ "$LATEST" =~ ^[0-9]+$ ]]; then
            echo "FATAL: Could not parse build number from output above."
            echo "Ensure {{ASC_APP_ID}} is the numeric Apple ID (not bundle ID) from App Store Connect."
            exit 1
          fi
          NEXT=$((LATEST + 1))
          echo "Build number: $LATEST -> $NEXT"
          cd {{COMPONENT_PREFIX}}. && agvtool new-version -all "$NEXT"

      - name: Clean stale build intermediates
        run: |
          # Gitignored output from a prior run persists between runs on the
          # dedicated runner; stale intermediates cause Swift incremental-
          # compilation exit-65 crashes during archive. Remove the archive/export
          # output dir the workflow creates.
          rm -rf "{{COMPONENT_PREFIX}}build"

      - name: Build and archive
        run: |
          set -o pipefail
          EXIT_CODE=0
          xcodebuild archive \
            -project {{XCODEPROJ}} \
            -scheme {{SCHEME}} \
            -configuration Release \
            -archivePath {{COMPONENT_PREFIX}}build/{{PROJECT_NAME}}.xcarchive \
            -allowProvisioningUpdates \
            2>&1 | xcpretty || EXIT_CODE=$?
          # Exit code 65 is a known spurious xcodebuild failure. Treat as success
          # ONLY if the .xcarchive was actually produced; otherwise fail. (pipefail
          # ensures $EXIT_CODE reflects xcodebuild's status, not xcpretty's.)
          if [ $EXIT_CODE -eq 65 ] && [ -d "{{COMPONENT_PREFIX}}build/{{PROJECT_NAME}}.xcarchive" ]; then
            echo "xcodebuild exited 65 but archive exists — treating as success."
            EXIT_CODE=0
          fi
          exit $EXIT_CODE

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath {{COMPONENT_PREFIX}}build/{{PROJECT_NAME}}.xcarchive \
            -exportOptionsPlist {{COMPONENT_PREFIX}}ExportOptions.plist \
            -exportPath {{COMPONENT_PREFIX}}build/ \
            2>&1 | xcpretty

      - name: Prepare TestFlight release notes
        id: whats_new
        if: ${{ github.event.inputs.skip_testflight != 'true' }}
        env:
          # Untrusted workflow_dispatch input — passed via env and only ever
          # written to a file with a quoted variable, never interpolated into
          # the script body, so metacharacters cannot inject shell commands.
          WHATS_NEW_INPUT: ${{ github.event.inputs.whats_new }}
        run: |
          set -euo pipefail
          notes_file="whats-new.txt"
          if [ -n "${WHATS_NEW_INPUT:-}" ]; then
            # Explicit notes provided — write verbatim (quoted var, no eval).
            printf '%s\n' "$WHATS_NEW_INPUT" > "$notes_file"
          else
            # Auto-generate from conventional-commit feat/fix/perf subjects since
            # the previous tag. git log output is redirected straight to a file —
            # never eval'd — so subjects with shell metacharacters are inert.
            last_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$last_tag" ]; then range="${last_tag}..HEAD"; else range="HEAD"; fi
            git log "$range" --no-merges --format='%s' \
              | grep -iE '^(feat|fix|perf)(\([^)]*\))?!?:' \
              | sed -E 's/^[a-zA-Z]+(\([^)]*\))?!?:[[:space:]]*/- /' \
              | cut -c1-200 \
              > "$notes_file" || true
            if [ ! -s "$notes_file" ]; then
              printf '%s\n' "Bug fixes and performance improvements." > "$notes_file"
            fi
          fi
          # App Store Connect caps "What's New" at 4000 chars — trim with headroom.
          head -c 3900 "$notes_file" > "${notes_file}.capped"
          mv "${notes_file}.capped" "$notes_file"
          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight
        if: ${{ github.event.inputs.skip_testflight != 'true' }}
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.ASC_KEY_CONTENT }}
          NOTES_FILE: ${{ steps.whats_new.outputs.notes_file }}
        run: |
          app-store-connect publish \
            --path {{COMPONENT_PREFIX}}build/{{PROJECT_NAME}}.ipa \
            --whats-new "$(cat "$NOTES_FILE")"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: '{{PROJECT_NAME}}-${{ github.ref_name }}.ipa'
          path: "{{COMPONENT_PREFIX}}build/{{PROJECT_NAME}}.ipa"
          retention-days: 30
          if-no-files-found: warn

      - name: Upload dSYM artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: '{{PROJECT_NAME}}-${{ github.ref_name }}.dSYM'
          path: "{{COMPONENT_PREFIX}}build/{{PROJECT_NAME}}.xcarchive/dSYMs/*.dSYM"
          retention-days: 90
          if-no-files-found: ignore

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: "{{COMPONENT_PREFIX}}build/{{PROJECT_NAME}}.ipa"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lock keychain
        if: always()
        run: security lock-keychain ~/Library/Keychains/login.keychain-db

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: failure()
    steps:
      - name: Send failure notification
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "Build failed for $REF_NAME"
          # Add Slack/Discord notification here if needed
