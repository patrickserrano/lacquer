# No `included` allowlist on purpose. SwiftLint intersects `included` with the
# path passed on the command line, so a GUESSED source-dir name (e.g.
# "{{PROJECT_NAME}}/") that doesn't match the project's actual layout (App/,
# nested, package sources, …) makes SwiftLint find "No lintable files" and
# silently enforce NOTHING. The CI/pre-commit invocations already pass the
# component path, so lint everything under it and just exclude build output and
# generated code — that works for any layout.
excluded:
  - "**/Generated"
  - "**/.build"
  - "**/.swiftpm"
  - "**/DerivedData"
  - "**/DerivedData-*"
  - "**/Package.swift"

opt_in_rules:
  - closure_body_length
  - contains_over_filter_count
  - empty_collection_literal
  - empty_count
  - empty_string
  - force_unwrapping
  - implicit_return
  - modifier_order
  - multiline_arguments
  - sorted_imports
  - trailing_closure
  - type_contents_order

disabled_rules:
  - todo
  - opening_brace
  - trailing_whitespace
  - trailing_comma
  - identifier_name

line_length:
  warning: 120
  error: 150
  ignores_comments: true

file_length:
  warning: 400
  error: 500
  ignore_comment_only_lines: true

type_body_length:
  warning: 300
  error: 350

function_body_length:
  warning: 40
  error: 60

force_unwrapping:
  severity: error

type_contents_order:
  order:
    - case
    - associated_type
    - type_alias
    - subtype
    - type_property
    - instance_property
    - initializer
    - deinitializer
    - type_method
    - view_life_cycle_method
    - subscript
    - other_method

# NOTE: a related Release-only hazard worth a project-specific rule — an
# un-gated `#Preview` that references a helper defined only inside `#if DEBUG`
# compiles fine in Debug and passes the Test job, but breaks the Release
# archive. If you add such DEBUG-only preview helpers, add a custom rule that
# requires their containing files to have an `#if DEBUG`, and lean on the
# CI "Build (Release)" job as the backstop.
custom_rules:
  no_singleton_abuse:
    name: "Avoid .shared singletons"
    regex: "\\.shared(?!Container|Instance\\(\\)|\\(\\))"
    message: "Prefer dependency injection over singletons"
    severity: warning

  sendable_protocol:
    name: "Protocols should require Sendable"
    regex: "protocol\\s+(\\w+)(Fetching|Repository|Service|Provider|Managing)\\s*(?!:.*Sendable)"
    message: "Service/Repository protocols should require Sendable"
    severity: warning

  no_print_statements:
    name: "No print statements"
    regex: "\\bprint\\s*\\("
    message: "Use Logger instead of print()"
    severity: warning
    excluded: ".*Tests\\.swift$"

  no_task_sleep_in_tests:
    name: "No Task.sleep in tests"
    regex: "Task\\.sleep\\s*\\("
    message: "Use condition-based waiting instead of Task.sleep() - arbitrary delays cause flaky tests"
    severity: error
    included: ".*Tests\\.swift$"

  no_new_xctest_files:
    name: "Prefer Swift Testing over XCTest"
    regex: "^import XCTest$"
    match_kinds: identifier
    message: "Use Swift Testing (@Test, @Suite) for new test files - XCTest is legacy"
    severity: warning
    included: ".*Tests\\.swift$"

  one_suite_per_file:
    name: "One @Suite per file"
    regex: "(?s)@Suite\\b.*@Suite\\b"
    message: "Each test file must contain at most one @Suite declaration"
    severity: error
    included: ".*Tests\\.swift$"

  prefer_polling_over_sleep_loops:
    name: "No sleep-based polling loops in tests"
    regex: "while\\s+.*\\{[^}]*Task\\.sleep"
    message: "Poll the condition directly instead of looping with Task.sleep"
    severity: warning
    included: ".*Tests\\.swift$"
    excluded: ".*TestHelpers\\.swift$"

  excessive_call_tracking:
    name: "Avoid excessive call tracking in mocks"
    regex: "(?:^\\s*(?:private\\(set\\)\\s+)?(?:var|let)\\s+\\w+Called\\s*[:=][^\\n]*\\n){3,}"
    message: "Excessive call tracking (3+ *Called properties) - prefer testing observable behavior over method calls"
    severity: warning
    included: ".*Mock.*\\.swift$"
    multiline: true

  no_failed_in_test_names:
    name: "Avoid 'failed' in test names"
    regex: "@Test\\s*\\(\"[^\"]*[Ff]ailed[^\"]*\"|@Test\\s*(?:\\([^)]*\\))?\\s*(?:@\\w+\\s+)*func\\s+(?:`[^`]*[Ff]ailed[^`]*`|\\w*[Ff]ailed\\w*)\\s*\\(|func\\s+test\\w*[Ff]ailed\\w*\\s*\\(|func\\s+`test[^`]*[Ff]ailed[^`]*`"
    message: "Avoid 'failed' in test names — test tooling misidentifies them as failures. Use 'errored', 'errors', or 'throws' instead."
    severity: error
    included: ".*Tests\\.swift$"
    multiline: true

  no_repository_in_viewmodel:
    name: "ViewModels must not depend directly on Repositories"
    regex: "(any|some)\\s+\\w+Repository"
    included: ".*ViewModel\\.swift"
    message: "Inject a Service protocol, not a Repository, into a ViewModel (keeps the layer boundary). Harvested from rail."
    severity: warning
