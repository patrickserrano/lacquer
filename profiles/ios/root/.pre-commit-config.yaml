repos:
  - repo: local
    hooks:
      - id: swiftformat
        name: SwiftFormat
        entry: swiftformat --config {{COMPONENT_PREFIX}}.swiftformat
        language: system
        types: [swift]
        files: ^{{COMPONENT_PREFIX}}

      - id: swiftlint
        name: SwiftLint
        entry: swiftlint --strict --config {{COMPONENT_PREFIX}}.swiftlint.yml
        language: system
        types: [swift]
        files: ^{{COMPONENT_PREFIX}}

      - id: swift-test
        name: Swift Tests
        # -derivedDataPath DerivedData keeps SPM resolution per-checkout,
        # avoiding the default-DerivedData "Couldn't check out revision"
        # corruption when other checkouts/CI race the shared SwiftPM cache.
        # Stderr is intentionally NOT suppressed and there is no fake-device
        # fallback: if the pinned simulator is missing, fail loudly with the
        # real error. `cd {{COMPONENT_PREFIX}}.` is `cd ios/.` for a nested
        # layout and `cd .` for a root layout.
        entry: bash -c 'cd {{COMPONENT_PREFIX}}. && xcodebuild test -scheme {{SCHEME}} -destination "platform=iOS Simulator,name=iPhone 17 Pro" -derivedDataPath DerivedData -only-testing:{{PROJECT_NAME}}Tests -quiet'
        language: system
        pass_filenames: false
        files: ^{{COMPONENT_PREFIX}}

      - id: no-secrets
        name: Check for hardcoded secrets
        entry: scripts/check-secrets.sh
        language: system
        pass_filenames: false

      - id: model-defaults
        name: SwiftData @Model inline defaults (CloudKit)
        # Non-optional @Model stored properties without an inline default crash
        # NSPersistentCloudKitContainer at runtime (Code=134060) — catch it here.
        entry: scripts/check-model-defaults.sh {{COMPONENT_PREFIX}}.
        language: system
        pass_filenames: false
        files: ^{{COMPONENT_PREFIX}}.*\.swift$

      # Conventional Commits — enforced by a LOCAL script (the lacquer keeps every
      # hook local: no remote pre-commit repo runs on every commit = no supply
      # chain to trust).
      - id: conventional-commit
        name: Conventional commit message
        entry: scripts/check-commit-msg.sh
        language: system
        stages: [commit-msg]
